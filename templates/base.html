<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI Video Gen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09090b; color: #f4f4f5; font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 antialiased min-h-screen flex flex-col font-sans p-6">
    <header class="flex justify-between items-center bg-zinc-900/50 border border-zinc-800 rounded-2xl px-6 py-4 mb-6 max-w-7xl mx-auto w-full">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-bold text-xl"><span class="text-white">🎬</span></div>
            <span class="font-semibold tracking-tight text-2xl text-white"><a href="/">NEXUS VIDEO</a></span>
        </div>
        <div class="flex items-center gap-6">
            <div class="text-right hidden sm:block">
                <p class="text-[10px] text-zinc-500 uppercase font-black tracking-widest">Local Render</p>
                <p class="text-sm font-bold text-zinc-300">M4 Runtime</p>
            </div>
            <div class="w-10 h-10 rounded-full bg-zinc-800 border border-zinc-700 overflow-hidden flex items-center justify-center text-zinc-400 font-bold text-sm">
                AI
            </div>
        </div>
    </header>
    <main class="flex-grow w-full max-w-7xl mx-auto h-full">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
