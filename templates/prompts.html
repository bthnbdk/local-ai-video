{% extends "base.html" %}
{% block content %}
<div class="h-full bg-zinc-900 border border-zinc-800 rounded-3xl p-8 max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-3xl font-bold tracking-tight">Master Prompt Profiles</h2>
        <a href="/" class="text-xs font-bold uppercase tracking-widest text-zinc-500 hover:text-white transition-colors">&larr; Dashboard</a>
    </div>
    
    {% if success %}
    <div class="bg-emerald-900/20 border border-emerald-800 text-emerald-400 text-sm font-bold p-4 rounded-xl mb-6">
        Prompts saved successfully.
    </div>
    {% endif %}

    <form method="POST" class="space-y-6">
        <div>
            <label class="block text-xs font-bold uppercase tracking-widest text-red-500 mb-3">YouTube Master Template (youtube_master.txt)</label>
            <textarea name="youtube_master.txt" rows="6" class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl py-3 px-4 text-white resize-none focus:outline-none focus:border-red-500 hover:border-zinc-700 transition-colors">{{ youtube }}</textarea>
        </div>
        
        <div class="pt-4">
            <label class="block text-xs font-bold uppercase tracking-widest text-cyan-500 mb-3">TikTok Master Template (tiktok_master.txt)</label>
            <textarea name="tiktok_master.txt" rows="6" class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl py-3 px-4 text-white resize-none focus:outline-none focus:border-cyan-500 hover:border-zinc-700 transition-colors">{{ tiktok }}</textarea>
        </div>

        <div class="pt-6">
            <button type="submit" class="w-full bg-blue-600 shadow-lg shadow-blue-900/20 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition uppercase tracking-widest text-xs">Save Prompts</button>
        </div>
    </form>
</div>
{% endblock %}
